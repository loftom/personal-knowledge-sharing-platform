server:
  port: 8080

spring:
  application:
    name: knowledge-platform-backend
  datasource:
    url: jdbc:mysql://localhost:3306/knowledge_platform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  sql:
    init:
      mode: never

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

app:
  jwt:
    secret: "replace-with-at-least-32-byte-secret-key-value"
    expire-seconds: 86400
