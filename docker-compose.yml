version: '3.9'
services:
  mysql:
    image: mysql:8.0
    container_name: personal-knowledge-platform-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: knowledge_platform
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command: ["--default-authentication-plugin=mysql_native_password"]
    volumes:
      - ./backend/sql:/docker-entrypoint-initdb.d

  redis:
    image: redis:7.2
    container_name: personal-knowledge-platform-redis
    ports:
      - "6379:6379"
